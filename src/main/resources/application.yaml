spring:
  datasource:
    url: jdbc:mysql://localhost:3306/beehive?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC
    username: root
    password: test1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    generate-ddl: true
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  sql:
    init:
      mode: always

logging:
  level:
    root: info
    com.nycsagnes.beehive: info
    org.springframework.web: error
    org.hibernate: error
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
