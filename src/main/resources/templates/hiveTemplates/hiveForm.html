<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HiveForm</title>
    <link rel="stylesheet" th:href="@{/stylesheets/hive_style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
<form th:action="@{/web/hives/new}" class="hive-form" method="post" th:object="${hive}">
    <div class="form-group">
        <label for="hiveName">Hive Name:</label>
        <input type="text" id="hiveName" th:field="*{hiveName}" required/>
    </div>
    <div class="form-group" >
        <label for="capacity">Kaptár kapacitása:</label>
        <input type="number" id="capacity" th:field="*{capacity}" min="10" required/>
    </div>
    <div class="button-container" style="text-align: center; margin-top: 20px;">
        <button type="submit" class="btn-save">Mentés</button>
        <a th:href="@{/web/hives}" class="btn-cancel">Mégse</a>
    </div>
</form>
</body>
</html>
