<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HiveForm</title>
    <link rel="stylesheet" th:href="@{/stylesheets/hive_style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
<form th:action="@{/web/bees/create}" class="hive-form" method="post" th:object="${bee}">
    <input type="hidden" th:field="*{hiveId}"/>
    <input type="hidden" th:if="*{hiveId != null}" th:field="*{beeType}"/>
    <div class="form-group">
        <label for="beeName">Bee Name:</label>
        <input type="text" id="beeName" th:field="*{beeName}" required/>
    </div>
    <div class="form-group" th:if="${bee.getBeeType() == null}">
        <label for="beeType">Bee Role:</label>
        <select id="beeType" th:field="*{beeType}" required>
            <option value="" disabled selected>Select a role</option>
            <option value="QUEEN">Queen</option>
            <option value="WORKER">Worker</option>
            <option value="DRONE">Drone</option>
        </select>
    </div>
    <div class="form-group" th:if="${bee.getBeeType() != null}">
        <label for="beeType">Bee Role:</label>
        <div class="bee-type-display">
            <span th:text="*{beeType}">Type</span>
        </div>
    </div>

    <div class="button-container">
        <button type="submit" class="static-btn btn-action">
            <span th:if="*{hiveId != null}">Save</span>
            <span th:if="*{hiveId == null}">Next</span>
        </button>
        <a th:if="*{hiveId != null}" th:href="@{/web/hives/{id}(id=*{hiveId})}" class="btn-navi">Cancel</a>
        <a th:if="*{hiveId == null}" th:href="@{/web/bees}" class="static-btn btn-navi">Cancel</a>
    </div>
</form>
</body>
</html>
