<!DOCTYPE html>
<html lang="en">
<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hive details</title>
    <link rel="stylesheet" th:href="@{/stylesheets/hive_style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="container">
    <header>
        <div class="header-section">
            <h1>Adatlap</h1>
        </div>
        <div class="button-container">
            <a th:href="@{/web/bees}" class="morph-btn btn-nav btn-navi btn-left">
                <span class="btn-icon">❮</span>
                <span class="btn-text">Vissza az Irodába</span>
            </a>
            <a th:if="${bee.hiveId != null}"
               th:href="@{/web/hives/{id}(id=${bee.hiveId})}" class="morph-btn btn-nav btn-navi btn-right">
                <span class="btn-icon">❯</span>
                <span class="btn-text">Vissza a Kaptárhoz</span>
            </a>
        </div>
    </header>
    <div class="bee-grid" th:object="${bee}">
        <div class="queen-placeholder-cell">
            <div class="bee-image bee-link"
                 th:style="'background-image: url(/images/beeImages/' + ${bee.beeType.name()} + '.png);'">
            </div>
            <div class="honeycomb-text">
                <div class="icon-overlay">"
                    <div class="morph-btn btn-hex btn-navi pos-top-left">
                        <span class="btn-icon">🏷️</span>
                        <span class="btn-text" th:text="'Név: ' + *{beeName}">Név</span>
                    </div>
                    <div class="morph-btn btn-hex btn-navi pos-mid-left">
                        <span class="btn-icon" th:switch="*{beeType}">
                            <span th:case="'QUEEN'">👑</span>
                            <span th:case="'WORKER'">🐝</span>
                            <span th:case="'DRONE'">♂️</span>
                            <span th:case="*">❓</span>
                        </span>
                        <span class="btn-text" th:text="*{beeType}">Munkakör</span>
                    </div>
                    <div class="morph-btn btn-hex btn-navi pos-bot-left">
                        <span class="btn-icon">⏳</span>
                        <span class="btn-text" th:text="'Kor: ' + *{ageInDays + ' nap'}">0 nap</span>
                    </div>
                    <a th:if="*{hiveId != null}"
                       th:href="@{/web/hives/{id}(id=*{hiveId})}"
                       class="morph-btn btn-hex btn-navi pos-top-right">
                        <span class="btn-icon">🏠</span>
                        <span class="btn-text" th:text="*{hiveName}">Kaptár</span>
                    </a>
                    <div th:if="*{hiveId == null}"
                         class="morph-btn btn-hex pos-top-right"
                         style="background-color: gray; cursor: default;">
                        <span class="btn-icon" style="filter: grayscale(100%);">🏠</span>
                    </div>
                    <form th:if="*{hiveId != null}"
                          th:action="@{/web/bees/evict/{id}(id=*{id})}" method="post"
                          style="display: contents;">
                        <button type="submit" class="morph-btn btn-hex btn-navi pos-mid-right"
                                th:data-confirm-msg="${bee.beeType.name() == 'QUEEN'}
                                ? 'Vigyázz! Ha a Királynőt kilakoltatod, a teljes kaptár kiürül! Biztos vagy benne?'
                                : 'Biztosan kilakoltatod ezt a méhet?'"
                                onclick="return confirm(this.getAttribute('data-confirm-msg'));">
                            <span class="btn-icon">❌</span>
                            <span class="btn-text">Kilakoltatás</span>
                        </button>
                    </form>
                    <a th:if="*{hiveId == null}"
                       th:href="@{/web/bees/move-in/{id}(id=*{id})}"
                       class="morph-btn btn-hex btn-navi pos-mid-right">
                        <span class="btn-icon">📥</span>
                        <span class="btn-text">Beköltözés</span>
                    </a>
                    <form th:action="@{/web/bees/execute/{id}(id=*{id})}" method="post"
                          style="display: contents;">
                        <button type="submit" class="morph-btn btn-hex btn-navi pos-bot-right"
                                th:data-confirm-msg="${bee.beeType.name() == 'QUEEN'}
                                ? 'Vigyázz! Ha a Királynőt kivégzed, a kaptár népe szétszéled! Biztos vagy benne?'
                                : 'Biztosan kivégzed ezt a méhet?'"
                                onclick="return confirm(this.getAttribute('data-confirm-msg'));">
                            <span class="btn-icon">☠️</span>
                            <span class="btn-text">Kivégzés</span>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
