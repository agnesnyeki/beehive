<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bee-Registry Office</title>
    <link rel="stylesheet" th:href="@{/stylesheets/hive_style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="main-container">
    <div class="header-section">
        <h1 class="page-title">ūüźĚ Office ūüźĚ</h1>
        <div class="stats-bar">
            <span>Number of bees: <strong th:text="${bees.size()}">0</strong></span>
        </div>
    </div>
    <div th:if="${message}" class="alert-box">
        <span class="alert-icon">ūüíÄ</span>
        <span th:text="${message}">Message appears here</span>
    </div>

    <!-- Unified Controls Container -->
    <div class="controls-wrapper">
        <input type="checkbox" id="controls-toggle" class="controls-toggle-check"/>
        <label for="controls-toggle" class="controls-toggle-btn morph-btn btn-navi">
            <span class="btn-icon">‚ėį</span>
            <span class="btn-text">Menu</span>
        </label>

        <div class="controls-container">
            <a th:href="@{/web/hives}" class="morph-btn btn-nav btn-navi control-item">
                <span class="btn-icon">‚Ěģ</span>
                <span class="btn-text">Back to the Apiary</span>
            </a>

            <div class="dropdown-wrapper">
                <input type="checkbox" id="filter-toggle" class="filter-toggle-check"/>

                <label for="filter-toggle" class="dropdown-trigger morph-btn btn-action">
                    <span class="btn-icon">‚öôÔłŹ</span>
                    <span class="btn-text" style="opacity: 1; max-width: none; margin-left: 10px;">Filters</span>
                </label>

                <div class="dropdown-content">
                    <a th:with="currentFilter=${param.filter}"
                       th:href="@{/web/bees(filter=${#strings.equals(currentFilter, 'HOMELESS') ? null : 'HOMELESS'})}"
                       th:classappend="${#strings.equals(currentFilter, 'HOMELESS')} ? 'active-dropdown-item' : ''"
                       class="dropdown-item">
                        ūüŹöÔłŹ Homeless
                    </a>

                    <a th:with="currentFilter=${param.filter}"
                       th:href="@{/web/bees(filter=${#strings.equals(currentFilter, 'QUEEN') ? null : 'QUEEN'})}"
                       th:classappend="${#strings.equals(currentFilter, 'QUEEN')} ? 'active-dropdown-item' : ''"
                       class="dropdown-item">
                        ūüĎĎ Queens
                    </a>

                    <a th:with="currentFilter=${param.filter}"
                       th:href="@{/web/bees(filter=${#strings.equals(currentFilter, 'DRONE') ? null : 'DRONE'})}"
                       th:classappend="${#strings.equals(currentFilter, 'DRONE')} ? 'active-dropdown-item' : ''"
                       class="dropdown-item">
                        ‚ôāÔłŹ Drones
                    </a>

                    <a th:with="currentFilter=${param.filter}"
                       th:href="@{/web/bees(filter=${#strings.equals(currentFilter, 'WORKER') ? null : 'WORKER'})}"
                       th:classappend="${#strings.equals(currentFilter, 'WORKER')} ? 'active-dropdown-item' : ''"
                       class="dropdown-item">
                        ūüźĚ Workers
                    </a>
                </div>
            </div>

            <a th:href="@{/web/bees/create}" class="morph-btn btn-nav btn-action control-item">
                <span class="btn-icon">‚úö</span>
                <span class="btn-text">Create New Bee</span>
            </a>
        </div>
    </div>

    <ul class="bee-grid">
        <li th:each="bee : ${bees}" class="bee-cell">
            <div class="bee-link">
                <div class="bee-image"
                     th:style="'background-image: url(/images/beeImages/' + ${bee.beeType} + '.png);'">
                </div>
                <div class="honeycomb-text">
                    <h4>
                        <a th:href="@{/web/bees/{id}(id=${bee.id})}"
                           th:text="${bee.beeName}"
                           class="name-link">Bee name</a>
                    </h4>
                    <a th:if="${bee.hiveId != null}"
                       th:href="@{/web/hives/{id}(id=${bee.hiveId})}"
                       class="morph-btn btn-list btn-navi">
                        <span class="btn-icon">‚ĚĮ</span>
                        <span class="btn-text" th:text="${bee.hiveName}">Hive</span>
                    </a>
                    <div th:if="${bee.hiveId == null}" class="morph-btn btn-list btn-navi">
                        <a th:href="@{/web/bees/move-in/{id}(id=${bee.id})}" class="assign-link">
                            <span class="btn-icon"> ‚úö</span>
                            <span class="btn-text">Move in</span>
                        </a>
                    </div>
                </div>
            </div>
        </li>
    </ul>
</div>
</body>
</html>
